name: Python build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Build
      run: |
        pip wheel -w dist .
        
    - name: Install dependencies without binary extensions
      run: |
        pip install --no-binary :all: power-grid-model
        pip install power-system-simulation[dev,example] --find-links=dist

    - name: Test with pytest
      run: |
        pytest

    - name: Check the format
      run: |
        isort --check . 
        black --check . 
        pylint power_system_simulation

    - name: Check notebook
      run: |
        jupyter execute example/final_presentation.ipynb
